<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="x5-orientation" content="landscape" />
  <meta name="full-screen" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>🦷 Dental Quest - เกมผจญภัยหมอฟัน</title>
  <meta name="description" content="เกมแพลตฟอร์มเมอร์ผจญภัยหมอฟัน สไตล์มาริโอ พร้อมระบบ Quiz ทดสอบความรู้ทันตกรรม" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }
    #game-container canvas {
      display: block;
    }
    /* Landscape prompt for portrait mode */
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0d1b2a, #1b2838);
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      z-index: 9999;
    }
    #rotate-prompt .icon { font-size: 72px; animation: rotate-anim 2s ease-in-out infinite; }
    #rotate-prompt p { font-size: 20px; text-align: center; line-height: 1.6; }
    #rotate-prompt .sub { font-size: 14px; color: #8899aa; }
    @keyframes rotate-anim {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(90deg); }
      75% { transform: rotate(90deg); }
    }
    @media (orientation: portrait) and (max-width: 820px) {
      #rotate-prompt { display: flex !important; }
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <div class="icon">📱</div>
    <p>กรุณาหมุนโทรศัพท์เป็นแนวนอน<br>เพื่อเล่นเกม 🦷</p>
    <p class="sub">Please rotate your device to landscape</p>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
